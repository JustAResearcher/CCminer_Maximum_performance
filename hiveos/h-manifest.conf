# Optimized ccminer-yescrypt for HiveOS
# YescryptR32 GPU miner — +41% over stock ccminer
CUSTOM_NAME=ccminer-yescrypt

# Log path
CUSTOM_LOG_BASENAME=/var/log/miner/ccminer-yescrypt/ccminer-yescrypt

# Config file (not used — config via command line)
CUSTOM_CONFIG_FILENAME=

# API port for stats (ccminer text API)
CUSTOM_API_PORT=4068

# Version
MINER_VER=1.0.0-optimized
MINER_NAME=$CUSTOM_NAME

MINER_LATEST_VER=$MINER_VER
